name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, fiber]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        uses: pnpm/action-setup@v4
      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
