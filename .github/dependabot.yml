version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "@playwright/*"
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
          - "jsdom"
      ox-tooling:
        patterns:
          - "oxfmt"
          - "oxlint"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
